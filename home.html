<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Github Issue Tracker</title>

    <link rel="stylesheet" href="./style.css">

    <!-- Tailwine and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-100">

    <nav class="bg-white shadow p-4 flex justify-between">

        <div class="flex gap-2 items-center">
            <img class="w-12" src="./assets/github-logo.png" alt="">

            <h2 class="text-2xl font-bold">
                GitHub Issues Tracker
            </h2>
        </div>


        <div class="flex gap-3">

            <input id="search-input" type="text" placeholder="Search" class="input input-bordered" />

            <button id="search-btn" class="btn btn-primary">
                Search
            </button>

        </div>

    </nav>

    <div class="container mx-auto p-6">

        <div class="tabs gap-3">

            <button class="tab tab-btn text-center border-2 border-gray-300  font-bold py-2 px-4 rounded"
                onclick="filterIssues('all')">
                All
            </button>

            <button class="tab tab-btn text-center border-2 border-gray-300 font-bold py-2 px-4 rounded"
                onclick="filterIssues('open')">
                Open
            </button>

            <button class="tab tab-btn text-center border-2 border-gray-300 font-bold py-2 px-4 rounded"
                onclick="filterIssues('closed')">
                Closed
            </button>



        </div>


        <div class=" flex justify-between items-center bg-gray-100 p-6 shadow mt-3 rounded">
            <div class="flex gap-3 items-center">
                <div>
                    <div><img src="./assets/Aperture.png" alt=""></div>
                </div>
                <div>
                    <p class="font-bold"><span id="issue-count">0</span> Issues</p>
                    <p class="text-gray-400">Track and manage your project issues</p>

                </div>
            </div>

            <div>
                <ul class="flex gap-5 items-center">
                    <li><i class="fa-solid fa-circle text-[12px] text-green-500"></i> Open</li>
                    <li><i class="fa-solid fa-circle text-[12px] text-purple-500"></i> Closed</li>
                </ul>
            </div>

        </div>

        <div id="issue-container" class=" grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6 ">

        </div>

    </div>


    <!-- Model content -->

    <dialog id="issueModal" class="modal">

        <div class="modal-box md:w-[700px] max-w-none relative" id="modal-content">


            <!-- Modal close button -->

        </div>

        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>

    </dialog>


    <!-- Loading spinner -->

    <div id="loader" class="text-center mt-10 hidden">
        <span class="loading loading-spinner loading-lg"></span>
    </div>







    <script src="./script/home.js"></script>
</body>

</html>
